<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>复盘系统交互工作台原型</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070b12;
      --surface: #101722;
      --surface-2: #151d2a;
      --surface-3: #0b111b;
      --line: rgba(222, 230, 244, 0.13);
      --line-strong: rgba(222, 230, 244, 0.24);
      --text: #f4f7fb;
      --muted: #a8b2c4;
      --soft: #6f7b8f;
      --blue: #8fa1ff;
      --green: #7fd8bf;
      --amber: #e1ac69;
      --red: #ff8f9b;
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
      line-height: 1.5;
      font-synthesis: none;
      text-rendering: optimizeLegibility;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100%;
      background:
        linear-gradient(rgba(255,255,255,0.028) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(180deg, #07101b 0%, #060912 100%);
      background-size: 64px 64px, 64px 64px, auto;
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      min-width: 0;
      font: inherit;
    }

    button {
      border: 0;
    }

    .shell {
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      border-right: 1px solid var(--line);
      background: rgba(11, 16, 26, 0.92);
      padding: 20px 14px;
    }

    .brand {
      display: grid;
      gap: 6px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 20px;
      margin-bottom: 18px;
    }

    .brand strong {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
    }

    .brand strong::before {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(143, 161, 255, 0.48);
      border-top-color: var(--amber);
      border-radius: 50%;
      content: "";
    }

    .brand span {
      color: var(--soft);
      font-size: 0.78rem;
    }

    .nav-label {
      margin: 16px 10px 7px;
      color: var(--soft);
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 42px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 0 10px;
      text-align: left;
      transition: background 150ms ease, color 150ms ease, transform 150ms ease;
    }

    .nav-item::before {
      width: 3px;
      height: 18px;
      border-radius: 999px;
      background: transparent;
      content: "";
    }

    .nav-item:hover {
      background: rgba(255,255,255,0.04);
      color: var(--text);
      transform: translateX(2px);
    }

    .nav-item.active {
      background: rgba(143, 161, 255, 0.13);
      color: var(--text);
    }

    .nav-item.active::before {
      background: var(--amber);
    }

    .content {
      min-width: 0;
      padding: 18px 22px 32px;
    }

    .status {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      color: var(--soft);
      padding: 0 0 13px;
      font-size: 0.75rem;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.12fr) minmax(360px, 0.88fr);
      gap: 18px;
      align-items: end;
      overflow: hidden;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background:
        linear-gradient(125deg, rgba(143, 161, 255, 0.18), transparent 40%),
        linear-gradient(90deg, rgba(127, 216, 191, 0.08), rgba(225, 172, 105, 0.08)),
        rgba(16, 23, 34, 0.96);
      margin-top: 16px;
      padding: 24px;
    }

    .eyebrow {
      margin: 0 0 7px;
      color: #c8c6ff;
      font-size: 0.72rem;
      font-weight: 850;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 8px;
      font-size: clamp(2rem, 4vw, 4rem);
      line-height: 1.02;
      letter-spacing: 0;
    }

    .hero p:last-child {
      max-width: 560px;
      margin-bottom: 0;
      color: var(--muted);
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .kpi {
      border: 1px solid rgba(222,230,244,0.12);
      border-radius: var(--radius);
      background: rgba(7,11,18,0.54);
      padding: 12px;
    }

    .kpi span,
    .muted,
    small {
      color: var(--soft);
      font-size: 0.78rem;
    }

    .kpi strong {
      display: block;
      margin-top: 5px;
      font-size: 1.1rem;
    }

    .progress {
      position: absolute;
      right: 24px;
      bottom: 0;
      left: 24px;
      height: 3px;
      overflow: hidden;
      border-radius: 999px 999px 0 0;
      background: rgba(255,255,255,0.08);
    }

    .progress span {
      display: block;
      width: 28%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--amber), var(--blue));
      transition: width 220ms ease;
    }

    .quick-grid,
    .workbench,
    .support-grid {
      display: grid;
      gap: 14px;
      margin-top: 14px;
    }

    .quick-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .workbench {
      grid-template-columns: minmax(0, 1.25fr) minmax(360px, 0.75fr);
    }

    .support-grid {
      grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
    }

    .quick-card,
    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.018)),
        rgba(16, 23, 34, 0.9);
    }

    .quick-card {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      color: var(--text);
      cursor: pointer;
      padding: 0 16px;
      transition: border-color 150ms ease, background 150ms ease, transform 150ms ease;
    }

    .quick-card:hover {
      border-color: rgba(127,216,191,0.38);
      background:
        linear-gradient(180deg, rgba(127,216,191,0.11), rgba(255,255,255,0.025)),
        rgba(16, 23, 34, 0.94);
      transform: translateY(-1px);
    }

    .quick-card:active {
      transform: scale(0.99);
    }

    .quick-icon {
      display: inline-grid;
      place-items: center;
      width: 24px;
      height: 24px;
      border: 1px solid rgba(127,216,191,0.4);
      border-radius: 50%;
      color: var(--green);
    }

    .quick-meta {
      margin-left: auto;
      color: var(--amber);
      font-weight: 800;
      font-size: 0.8rem;
    }

    .card {
      min-width: 0;
      padding: 16px;
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .title-row h2 {
      margin-bottom: 0;
      font-size: 1.05rem;
    }

    .pill {
      border: 1px solid rgba(127,216,191,0.24);
      border-radius: 999px;
      background: rgba(127,216,191,0.08);
      color: var(--green);
      padding: 4px 9px;
      font-size: 0.72rem;
      font-weight: 800;
    }

    form,
    .stack {
      display: grid;
      gap: 10px;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid rgba(222,230,244,0.11);
      border-radius: var(--radius);
      outline: none;
      background: rgba(7, 11, 18, 0.78);
      color: var(--text);
      padding: 11px 12px;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }

    textarea {
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(143,161,255,0.54);
      background: rgba(7, 11, 18, 0.96);
      box-shadow: 0 0 0 3px rgba(143,161,255,0.16);
    }

    .field-grid {
      display: grid;
      grid-template-columns: 120px minmax(160px, 0.7fr) minmax(200px, 1fr);
      gap: 10px;
    }

    .button,
    button.action {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #9aa7ff, #7585f2);
      color: white;
      cursor: pointer;
      font-weight: 850;
      padding: 0 14px;
      transition: transform 150ms ease, box-shadow 150ms ease, opacity 150ms ease;
    }

    .button:hover,
    button.action:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(92,108,220,0.22);
    }

    .ghost {
      border: 1px solid rgba(222,230,244,0.13);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      box-shadow: none;
    }

    .ghost:hover {
      box-shadow: none;
    }

    .records,
    .tasks,
    .ideas,
    .schedule {
      display: grid;
      gap: 8px;
      max-height: 310px;
      overflow: auto;
      padding-right: 2px;
    }

    .section-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      border-top: 1px solid var(--line);
      margin-top: 14px;
      padding-top: 13px;
      color: var(--soft);
      font-size: 0.78rem;
    }

    .row,
    .task,
    .idea,
    .slot {
      animation: itemIn 180ms ease both;
    }

    .row {
      display: grid;
      grid-template-columns: 10px minmax(0, 1fr) auto auto;
      gap: 10px;
      align-items: center;
      border-radius: 6px;
      padding: 8px 4px;
    }

    .row:hover,
    .task:hover {
      background: rgba(255,255,255,0.038);
    }

    .color {
      width: 10px;
      height: 36px;
      border-radius: 999px;
      background: var(--green);
    }

    .row strong,
    .task span,
    .idea p,
    .slot span {
      overflow-wrap: anywhere;
    }

    .icon-btn,
    .check {
      flex: 0 0 34px;
      width: 34px;
      min-height: 34px;
      border: 1px solid rgba(222,230,244,0.12);
      background: rgba(255,255,255,0.045);
      color: var(--muted);
      padding: 0;
    }

    .icon-btn:hover,
    .check:hover {
      background: rgba(143,161,255,0.13);
      box-shadow: none;
    }

    .project-list {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 12px;
    }

    .project-chip {
      justify-content: space-between;
      min-height: 40px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.035);
      color: var(--muted);
      padding: 0 10px;
    }

    .project-chip.active {
      border-color: rgba(225,172,105,0.55);
      background: rgba(225,172,105,0.12);
      color: var(--text);
    }

    .focus-card {
      display: grid;
      gap: 9px;
      border-left: 3px solid var(--green);
      background: linear-gradient(90deg, rgba(127,216,191,0.14), transparent);
      margin-bottom: 12px;
      padding: 8px 0 8px 12px;
    }

    .track {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
    }

    .track span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--green), var(--amber));
      transition: width 220ms ease;
    }

    .task-form,
    .idea-actions,
    .schedule-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    .task {
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 6px;
      padding: 8px;
      transition: background 150ms ease, transform 150ms ease;
    }

    .task.done span {
      color: var(--soft);
      text-decoration: line-through;
    }

    .task:hover {
      transform: translateX(2px);
    }

    .schedule-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255,255,255,0.035);
      margin-bottom: 10px;
      padding: 12px;
      text-align: center;
    }

    .schedule-meta strong {
      display: block;
      margin-top: 3px;
    }

    .slot {
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr) minmax(80px, auto);
      gap: 9px;
      align-items: center;
      border: 1px solid rgba(222,230,244,0.08);
      border-radius: 6px;
      background: rgba(255,255,255,0.028);
      padding: 8px 10px;
    }

    .slot time {
      color: var(--blue);
      font-weight: 850;
      font-variant-numeric: tabular-nums;
    }

    .idea {
      border: 1px solid rgba(222,230,244,0.09);
      border-radius: 6px;
      background: rgba(255,255,255,0.028);
      padding: 10px;
    }

    .idea p {
      margin-bottom: 8px;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: min(560px, calc(100vw - 44px));
      border: 1px solid rgba(127,216,191,0.26);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(127,216,191,0.1), rgba(255,255,255,0.025)),
        #111a25;
      box-shadow: 0 20px 60px rgba(0,0,0,0.34);
      color: var(--text);
      padding: 12px 14px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @keyframes itemIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1180px) {
      .hero,
      .workbench,
      .support-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 820px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .sidebar {
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 8px;
        height: auto;
        overflow-x: auto;
        padding: 10px 12px;
      }

      .brand,
      .nav-label {
        display: none;
      }

      .nav-item {
        flex: 0 0 auto;
        width: auto;
        padding: 0 12px;
        white-space: nowrap;
      }

      .content {
        padding: 12px;
      }

      .hero {
        padding: 18px;
      }

      .kpis,
      .quick-grid,
      .field-grid,
      .project-list,
      .schedule-meta,
      .task-form,
      .idea-actions,
      .schedule-actions {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 2.2rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>Personal Review System</strong>
        <span>Life · Assets · Progress</span>
      </div>
      <p class="nav-label">核心</p>
      <button class="nav-item active" type="button">快速记录</button>
      <button class="nav-item" type="button">今日复盘</button>
      <button class="nav-item" type="button">仪表盘</button>
      <p class="nav-label">系统</p>
      <button class="nav-item" type="button">资产定义</button>
    </aside>

    <main class="content">
      <div class="status">
        <span>本地数据已自动保存</span>
        <span>localStorage: app:review-system:v1</span>
      </div>

      <section class="hero">
        <div>
          <p class="eyebrow">Today Command</p>
          <h1>快速记录今天</h1>
          <p>先把发生过的事落下来，再把下一步任务推出去。</p>
        </div>
        <div class="kpis">
          <div class="kpi"><span>已记录</span><strong id="totalMinutes">2 小时 15 分钟</strong></div>
          <div class="kpi"><span>今日进度</span><strong id="todayProgress">45%</strong></div>
          <div class="kpi"><span>完成任务</span><strong id="doneCount">1 项</strong></div>
        </div>
        <div class="progress"><span id="progressBar"></span></div>
      </section>

      <section class="quick-grid" aria-label="一键记录">
        <button class="quick-card" data-title="深度学习" data-duration="45" data-category="学业资产" type="button">
          <span class="quick-icon">◎</span><strong>学习</strong><span class="quick-meta">45min</span>
        </button>
        <button class="quick-card" data-title="训练" data-duration="60" data-category="身体资产" type="button">
          <span class="quick-icon">◎</span><strong>训练</strong><span class="quick-meta">60min</span>
        </button>
        <button class="quick-card" data-title="英语输入" data-duration="30" data-category="英语资产" type="button">
          <span class="quick-icon">◎</span><strong>英语</strong><span class="quick-meta">30min</span>
        </button>
      </section>

      <section class="workbench">
        <div class="card">
          <div class="title-row">
            <div>
              <p class="eyebrow">Record</p>
              <h2>现在补一条记录</h2>
            </div>
            <span class="pill">本地保存</span>
          </div>
          <form id="recordForm">
            <input id="eventTitle" placeholder="做了什么，比如：上午学 React 2h" aria-label="事件标题" />
            <div class="field-grid">
              <input id="eventDuration" type="number" min="1" step="1" placeholder="分钟" aria-label="事件时长" />
              <select id="eventCategory" aria-label="事件分类">
                <option>学业资产</option>
                <option>英语资产</option>
                <option>身体资产</option>
                <option>输出资产</option>
                <option>注意力消耗</option>
              </select>
              <select aria-label="关联项目">
                <option>跟随当前项目：交互体验改造</option>
                <option>不关联项目</option>
              </select>
            </div>
            <button class="action" type="submit">＋ 添加记录</button>
          </form>

          <div class="section-line">
            <span>今日已记录</span>
            <strong id="eventCount">3</strong>
          </div>
          <div class="records" id="records"></div>
        </div>

        <div class="card">
          <div class="title-row">
            <div>
              <p class="eyebrow">Focus</p>
              <h2>当前推进</h2>
            </div>
            <span class="pill" id="projectPct">33%</span>
          </div>
          <div class="project-list">
            <button class="project-chip active" type="button">交互体验改造 <small>33%</small></button>
            <button class="project-chip" type="button">复盘流程 <small>12%</small></button>
          </div>
          <div class="focus-card">
            <small>学业资产</small>
            <strong>交互体验改造</strong>
            <div class="track"><span id="projectTrack" style="width: 33%"></span></div>
          </div>
          <form id="taskForm" class="task-form">
            <input id="taskTitle" placeholder="给当前项目加一个下一步任务" aria-label="任务标题" />
            <button class="action" type="submit">＋ 任务</button>
          </form>
          <div class="tasks" id="tasks"></div>
        </div>
      </section>

      <section class="support-grid">
        <div class="card">
          <div class="title-row">
            <div>
              <p class="eyebrow">Plan</p>
              <h2>今日日程</h2>
            </div>
            <span>▦</span>
          </div>
          <div class="schedule-meta">
            <span class="muted">额度<strong>5 小时</strong></span>
            <span class="muted">来源<strong>默认额度</strong></span>
            <span class="muted">时间块<strong id="slotCount">5 个</strong></span>
          </div>
          <div class="schedule" id="schedule"></div>
          <div class="schedule-actions">
            <button class="button ghost" id="regen" type="button">重新生成</button>
            <button class="button" id="saveSchedule" type="button">保存日程</button>
          </div>
        </div>

        <div class="card">
          <div class="title-row">
            <div>
              <p class="eyebrow">Ideas</p>
              <h2>想法池</h2>
            </div>
            <span>◌</span>
          </div>
          <form id="ideaForm">
            <textarea id="ideaText" rows="3" placeholder="突然想到的事、素材、复盘问题，先丢进来" aria-label="想法内容"></textarea>
            <div class="idea-actions">
              <select aria-label="想法关联项目">
                <option>跟随当前项目</option>
                <option>交互体验改造</option>
              </select>
              <button class="action" type="submit">＋ 收进池子</button>
            </div>
          </form>
          <div class="ideas" id="ideas"></div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const state = {
      target: 300,
      events: [
        { title: "重画记录页结构", duration: 50, category: "输出资产", color: "#f4b26b" },
        { title: "深度学习", duration: 45, category: "学业资产", color: "#7fd8bf" },
        { title: "训练", duration: 40, category: "身体资产", color: "#e1ac69" },
      ],
      tasks: [
        { title: "把快速记录页改成工作台", done: true },
        { title: "补齐任务完成后的反馈", done: false },
        { title: "移动端检查按钮是否溢出", done: false },
      ],
      ideas: [
        "把记录页的空白感继续压低",
        "复盘页需要一眼看出今天是资产增加还是消耗",
      ],
      schedule: [
        ["07:00", "把快速记录页改成工作台", "输出资产"],
        ["07:30", "深度学习", "学业资产"],
        ["08:00", "训练", "身体资产"],
        ["08:30", "复盘", "学业资产"],
        ["09:00", "整理", "生存任务"],
      ],
    };

    const colors = {
      "学业资产": "#7fd8bf",
      "英语资产": "#8fa1ff",
      "身体资产": "#e1ac69",
      "输出资产": "#f4b26b",
      "注意力消耗": "#ff8f9b",
      "生存任务": "#b6c0d3",
    };

    const $ = (selector) => document.querySelector(selector);
    const minutesText = (minutes) => {
      const hours = Math.floor(minutes / 60);
      const rest = minutes % 60;
      if (hours === 0) return `${rest} 分钟`;
      if (rest === 0) return `${hours} 小时`;
      return `${hours} 小时 ${rest} 分钟`;
    };

    let toastTimer = null;
    function toast(text) {
      const node = $("#toast");
      node.textContent = text;
      node.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => node.classList.remove("show"), 2200);
    }

    function render() {
      const total = state.events.reduce((sum, event) => sum + event.duration, 0);
      const pct = Math.min(100, Math.round((total / state.target) * 100));
      const done = state.tasks.filter((task) => task.done).length;
      const projectPct = Math.round((done / Math.max(1, state.tasks.length)) * 100);

      $("#totalMinutes").textContent = minutesText(total);
      $("#todayProgress").textContent = `${pct}%`;
      $("#doneCount").textContent = `${done} 项`;
      $("#progressBar").style.width = `${pct}%`;
      $("#eventCount").textContent = state.events.length;
      $("#projectPct").textContent = `${projectPct}%`;
      $("#projectTrack").style.width = `${projectPct}%`;
      $("#slotCount").textContent = `${state.schedule.length} 个`;

      $("#records").innerHTML = state.events.map((event, index) => `
        <div class="row">
          <span class="color" style="background:${event.color || colors[event.category] || colors["学业资产"]}"></span>
          <div><strong>${event.title}</strong><br><small>${event.category}</small></div>
          <strong>${minutesText(event.duration)}</strong>
          <button class="icon-btn" type="button" data-delete-event="${index}" aria-label="删除记录">×</button>
        </div>
      `).join("");

      $("#tasks").innerHTML = state.tasks.map((task, index) => `
        <div class="task ${task.done ? "done" : ""}">
          <button class="check" type="button" data-toggle-task="${index}" aria-label="完成任务">${task.done ? "✓" : ""}</button>
          <span>${task.title}</span>
          <button class="icon-btn" type="button" data-delete-task="${index}" aria-label="删除任务">×</button>
        </div>
      `).join("");

      $("#ideas").innerHTML = state.ideas.map((idea, index) => `
        <div class="idea">
          <p>${idea}</p>
          <div class="idea-actions">
            <small>2026-05-19</small>
            <button class="button ghost" type="button" data-idea-task="${index}">转任务</button>
          </div>
        </div>
      `).join("");

      $("#schedule").innerHTML = state.schedule.map((slot) => `
        <div class="slot">
          <time>${slot[0]}</time>
          <span>${slot[1]}</span>
          <small>${slot[2]}</small>
        </div>
      `).join("");
    }

    document.addEventListener("click", (event) => {
      const quick = event.target.closest(".quick-card");
      if (quick) {
        state.events.unshift({
          title: quick.dataset.title,
          duration: Number(quick.dataset.duration),
          category: quick.dataset.category,
          color: colors[quick.dataset.category],
        });
        render();
        toast(`已记录「${quick.dataset.title}」${quick.dataset.duration}分钟`);
        return;
      }

      const eventDelete = event.target.closest("[data-delete-event]");
      if (eventDelete) {
        const item = state.events.splice(Number(eventDelete.dataset.deleteEvent), 1)[0];
        render();
        toast(`已删除「${item.title}」`);
        return;
      }

      const taskToggle = event.target.closest("[data-toggle-task]");
      if (taskToggle) {
        const task = state.tasks[Number(taskToggle.dataset.toggleTask)];
        task.done = !task.done;
        render();
        toast(task.done ? `完成任务「${task.title}」` : `已恢复任务「${task.title}」`);
        return;
      }

      const taskDelete = event.target.closest("[data-delete-task]");
      if (taskDelete) {
        const task = state.tasks.splice(Number(taskDelete.dataset.deleteTask), 1)[0];
        render();
        toast(`已删除任务「${task.title}」`);
        return;
      }

      const ideaTask = event.target.closest("[data-idea-task]");
      if (ideaTask) {
        const idea = state.ideas.splice(Number(ideaTask.dataset.ideaTask), 1)[0];
        state.tasks.unshift({ title: idea, done: false });
        render();
        toast("想法已转为任务");
        return;
      }

      if (event.target.id === "regen") {
        state.schedule = [
          ["07:00", state.tasks.find((task) => !task.done)?.title || "深度学习", "学业资产"],
          ["07:30", "英语输入", "英语资产"],
          ["08:00", "训练", "身体资产"],
          ["08:30", "整理材料", "输出资产"],
          ["09:00", "复盘", "学业资产"],
        ];
        render();
        toast("已重新生成今日日程");
      }

      if (event.target.id === "saveSchedule") {
        toast("今日日程已保存");
      }
    });

    $("#recordForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const title = $("#eventTitle").value.trim();
      const duration = Number($("#eventDuration").value);
      const category = $("#eventCategory").value;
      if (!title || !duration) {
        toast("先填事件和分钟数");
        return;
      }
      state.events.unshift({ title, duration, category, color: colors[category] });
      $("#eventTitle").value = "";
      $("#eventDuration").value = "";
      render();
      toast(`已记录「${title}」${duration}分钟`);
    });

    $("#taskForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const title = $("#taskTitle").value.trim();
      if (!title) {
        toast("先写一个任务");
        return;
      }
      state.tasks.unshift({ title, done: false });
      $("#taskTitle").value = "";
      render();
      toast(`已加入任务「${title}」`);
    });

    $("#ideaForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const text = $("#ideaText").value.trim();
      if (!text) {
        toast("先写一个想法");
        return;
      }
      state.ideas.unshift(text);
      $("#ideaText").value = "";
      render();
      toast("想法已进入池子");
    });

    render();
  </script>
</body>
</html>
